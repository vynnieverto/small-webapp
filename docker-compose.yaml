  #     test: ["CMD", "pg_isready", "-U", "csc309", "-d", "mydb"]
  #     interval: 5s
  #     retries: 5
  #   networks:
  #     - my_network
  app:
    image: small-webapp:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - small-webapp-data:/app/data
    env_file:
      - .env.docker

    networks:
      - my_network
    # depends_on:
    #   database:
    #     condition: service_healthy      
networks:
  my_network:
    driver: bridge

